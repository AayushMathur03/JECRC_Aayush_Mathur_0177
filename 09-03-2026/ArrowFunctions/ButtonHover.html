<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Hover Event</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:40px;
}

button{
    padding:12px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>

<body>

<h2>Mouse Hover Event Example</h2>

<button id="submitBtn">Submit</button>

<p id="message"></p>

<script>

// Hover event using arrow function
document.getElementById("submitBtn").addEventListener("mouseover", () => {

    console.log("Mouse hovered over submit button");

    // show message on page
    document.getElementById("message").textContent = "Mouse hovered over submit button";

});

</script>

</body>
</html>
