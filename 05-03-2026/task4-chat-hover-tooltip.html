<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Customer Support Chat Hover</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

#chatIcon{
    font-size:22px;
    padding:15px 20px;
    background:#007bff;
    color:white;
    display:inline-block;
    border-radius:6px;
    cursor:pointer;
}

#chatIcon:hover{
    background:#0056b3;
}

#info{
    margin-top:20px;
    color:#333;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Customer Support</h2>

<div id="chatIcon">💬 Chat Support</div>

<p id="info"></p>

</div>


<script>

document.getElementById("chatIcon").addEventListener("mouseover", function(){

    document.getElementById("info").innerText =
    "Click here to talk with customer support";

    console.log("Mouse hovered over chat icon");

});

</script>

</body>

</html>
